name: Release Preview

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
    paths:
      - ".github/workflows/**"
      - ".cargo/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - "justfile"
      - "crates/**"
      - "scripts/**"
      - "assets/icons/**"
      - "README.md"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref || github.run_id }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"
  HUNK_RELEASE_VERSION: pr-${{ github.event.pull_request.number || github.run_number }}-${{ github.sha }}

jobs:
  macos:
    name: macOS ARM64 DMG
    runs-on: macos-15
    timeout-minutes: 90
    env:
      APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      APPLE_NOTARY_API_KEY_BASE64: ${{ secrets.APPLE_NOTARY_API_KEY_BASE64 }}
      APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
      APPLE_NOTARY_ISSUER: ${{ secrets.APPLE_NOTARY_ISSUER }}
      HUNK_TRUSTED_PR: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          clean: false

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Resolve shared cargo target dir
        run: echo "CARGO_TARGET_DIR=$(./scripts/resolve_cargo_target_dir.sh "$GITHUB_WORKSPACE")" >> "$GITHUB_ENV"
        shell: bash

      - name: Cache cargo registry and Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-preview-${{ runner.os }}-desktop
          workspaces: |
            . -> target-shared
          cache-on-failure: "true"

      - name: Install cargo-bundle
        run: cargo install cargo-bundle --locked --version 0.9.0
        shell: bash

      - name: Import Apple signing certificate
        if: ${{ env.HUNK_TRUSTED_PR == 'true' && env.APPLE_CERTIFICATE_P12_BASE64 != '' && env.APPLE_CERTIFICATE_PASSWORD != '' && env.APPLE_SIGNING_IDENTITY != '' }}
        run: |
          KEYCHAIN_PASSWORD="$RUNNER_TEMP/hunk-release-keychain"
          CERT_PATH="$RUNNER_TEMP/hunk-signing-cert.p12"
          echo "$APPLE_CERTIFICATE_P12_BASE64" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security import "$CERT_PATH" -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" build.keychain
        shell: bash

      - name: Prepare Apple notary API key
        if: ${{ env.HUNK_TRUSTED_PR == 'true' && env.APPLE_NOTARY_API_KEY_BASE64 != '' && env.APPLE_NOTARY_KEY_ID != '' && env.APPLE_NOTARY_ISSUER != '' }}
        run: |
          KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_NOTARY_KEY_ID}.p8"
          echo "$APPLE_NOTARY_API_KEY_BASE64" | base64 --decode > "$KEY_PATH"
          chmod 600 "$KEY_PATH"
          echo "APPLE_NOTARY_API_KEY_PATH=$KEY_PATH" >> "$GITHUB_ENV"
        shell: bash

      - name: Package macOS release artifact
        id: package
        run: |
          artifact_path="$(./scripts/package_macos_release.sh | tail -n 1)"
          echo "artifact_path=$artifact_path" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Upload macOS release preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: hunk-macos-arm64-dmg
          path: ${{ steps.package.outputs.artifact_path }}
          if-no-files-found: error

  linux:
    name: Linux x86_64 tarball
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          clean: false

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Resolve shared cargo target dir
        run: echo "CARGO_TARGET_DIR=$(./scripts/resolve_cargo_target_dir.sh "$GITHUB_WORKSPACE")" >> "$GITHUB_ENV"
        shell: bash

      - name: Cache cargo registry and Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-preview-${{ runner.os }}-desktop
          workspaces: |
            . -> target-shared
          cache-on-failure: "true"

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang \
            cmake \
            libasound2-dev \
            libfontconfig-dev \
            libgit2-dev \
            libglib2.0-dev \
            libssl-dev \
            libvulkan1 \
            libwayland-dev \
            libx11-xcb-dev \
            libxkbcommon-x11-dev \
            libzstd-dev \
            pkg-config
        shell: bash

      - name: Package Linux release artifact
        id: package
        run: |
          artifact_path="$(./scripts/package_linux_release.sh | tail -n 1)"
          echo "artifact_path=$artifact_path" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Upload Linux release preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: hunk-linux-x86_64-tarball
          path: ${{ steps.package.outputs.artifact_path }}
          if-no-files-found: error

  windows:
    name: Windows x86_64 MSI
    runs-on: windows-2022
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          clean: false

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Resolve shared cargo target dir
        run: |
          $targetDir = bash ./scripts/resolve_cargo_target_dir.sh $env:GITHUB_WORKSPACE
          "CARGO_TARGET_DIR=$targetDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        shell: pwsh

      - name: Cache cargo registry and Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-preview-${{ runner.os }}-desktop
          workspaces: |
            . -> target-shared
          cache-on-failure: "true"

      - name: Install cargo-bundle
        run: cargo install cargo-bundle --locked --version 0.9.0
        shell: pwsh

      - name: Package Windows release artifact
        id: package
        run: |
          $artifactPath = (pwsh ./scripts/package_windows_release.ps1 | Select-Object -Last 1).Trim()
          "artifact_path=$artifactPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
        shell: pwsh

      - name: Upload Windows release preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: hunk-windows-x86_64-msi
          path: ${{ steps.package.outputs.artifact_path }}
          if-no-files-found: error
